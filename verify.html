<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Sertifikat Blockchain</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f0f4ff;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .page-header h1 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .page-header p {
            font-size: 13px;
            color: #64748b;
        }

        /* Network badge */
        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 99px;
            margin-bottom: 28px;
        }
        .network-dot {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }

        /* Valid / Invalid border */
        .card-valid   { border-left: 6px solid #22c55e; }
        .card-invalid { border-left: 6px solid #ef4444; }

        /* Status row */
        .status-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .status-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        .status-icon.valid   { background: #dcfce7; }
        .status-icon.invalid { background: #fee2e2; }

        .status-text h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .status-text h2.valid   { color: #15803d; }
        .status-text h2.invalid { color: #b91c1c; }
        .status-text p {
            font-size: 13px;
            color: #64748b;
            margin-top: 3px;
            line-height: 1.4;
        }

        /* Detail rows */
        .detail-section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .detail-section h3 {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 7px 0;
            border-bottom: 1px solid #e2e8f0;
            gap: 12px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .detail-value {
            font-size: 13px;
            color: #0f172a;
            font-weight: 600;
            text-align: right;
        }

        /* Nama besar */
        .nama-besar {
            font-size: 22px;
            font-weight: 700;
            color: #1e3a8a;
            text-align: center;
            padding: 14px 0 6px;
        }
        .kegiatan-label {
            font-size: 14px;
            color: #475569;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Status blockchain */
        .blockchain-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 14px;
        }
        .blockchain-status span {
            font-size: 13px;
            font-weight: 600;
            color: #15803d;
        }

        /* Hash box */
        .hash-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
        }
        .hash-box .hash-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .hash-box .hash-value {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #475569;
            word-break: break-all;
            line-height: 1.6;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 48px 0;
            color: #64748b;
            font-size: 14px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #1e3a8a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        .error-card {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 16px;
            padding: 28px;
            text-align: center;
        }
        .error-card .error-icon { font-size: 40px; margin-bottom: 12px; }
        .error-card h3 { color: #b91c1c; font-size: 16px; margin-bottom: 8px; }
        .error-card p  { color: #7f1d1d; font-size: 13px; line-height: 1.5; }

        /* Footer */
        .page-footer {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 8px;
        }
        .page-footer a { color: #1d4ed8; text-decoration: none; }
    </style>
</head>

<body>
<div class="container">

    <div class="page-header">
        <h1>🔍 Verifikasi Sertifikat</h1>
        <p>Blockchain Certificate Verification System</p>
    </div>

    <div style="text-align:center">
        <div class="network-badge">
            <span class="network-dot"></span>
            Ethereum Sepolia Testnet
        </div>
    </div>

    <div id="app">
        <!-- Loading awal -->
        <div class="card" id="loadingCard">
            <div class="loading">
                <div class="spinner"></div>
                Menghubungi blockchain...
            </div>
        </div>
    </div>

    <div class="page-footer">
        Lihat kontrak di
        <a href="https://sepolia.etherscan.io/address/0x97FD52D4aeeF99D423799EDa0Bc53312351d0144" target="_blank">
            Sepolia Etherscan
        </a>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>
const CONTRACT_ADDRESS = "0x97FD52D4aeeF99D423799EDa0Bc53312351d0144";
const RPC_URL          = "https://ethereum-sepolia-rpc.publicnode.com";

const ABI = [{
    "inputs": [{ "internalType": "bytes32", "name": "hash", "type": "bytes32" }],
    "name": "verifyCertificate",
    "outputs": [
        { "internalType": "bool",    "name": "isValid",  "type": "bool"    },
        { "internalType": "uint256", "name": "issuedAt", "type": "uint256" },
        { "internalType": "string",  "name": "certId",   "type": "string"  }
    ],
    "stateMutability": "view",
    "type": "function"
}];

const provider = new ethers.providers.JsonRpcProvider(RPC_URL);
const contract  = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

function escapeHtml(str) {
    return String(str || "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function formatTimestamp(unixSeconds) {
    if (!unixSeconds || unixSeconds === 0) return "-";
    const d = new Date(Number(unixSeconds) * 1000);
    return d.toLocaleDateString("id-ID", {
        weekday: "long", year: "numeric", month: "long", day: "numeric",
        hour: "2-digit", minute: "2-digit", timeZoneName: "short"
    });
}

function renderError(msg) {
    document.getElementById("app").innerHTML = `
        <div class="error-card">
            <div class="error-icon">⚠️</div>
            <h3>Tidak Dapat Memverifikasi</h3>
            <p>${escapeHtml(msg)}</p>
        </div>`;
}

function renderResult(isValid, issuedAt, certId, hashHex, qrData) {
    const app = document.getElementById("app");

    if (!isValid) {
        app.innerHTML = `
        <div class="card card-invalid">
            <div class="status-row">
                <div class="status-icon invalid">❌</div>
                <div class="status-text">
                    <h2 class="invalid">Sertifikat Tidak Valid</h2>
                    <p>Hash ini tidak terdaftar di blockchain. Sertifikat mungkin tidak resmi atau datanya telah diubah.</p>
                </div>
            </div>
            <div class="hash-box">
                <div class="hash-label">Hash yang diverifikasi</div>
                <div class="hash-value">${escapeHtml(hashHex)}</div>
            </div>
        </div>`;
        return;
    }

    // Data dari QR (jika ada) atau dari blockchain
    const nama      = qrData ? escapeHtml(qrData.nama)      : "-";
    const nim       = qrData ? escapeHtml(qrData.nim)       : "-";
    const prodi     = qrData ? escapeHtml(qrData.prodi)     : "-";
    const angkatan  = qrData ? escapeHtml(qrData.angkatan)  : "-";
    const kegiatan  = qrData ? escapeHtml(qrData.kegiatan)  : "-";
    const tanggal   = qrData ? escapeHtml(qrData.tanggal)   : "-";

    app.innerHTML = `
    <div class="card card-valid">

        <div class="status-row">
            <div class="status-icon valid">✅</div>
            <div class="status-text">
                <h2 class="valid">Sertifikat Valid</h2>
                <p>Hash terdaftar di blockchain dan telah diverifikasi keasliannya.</p>
            </div>
        </div>

        <div class="nama-besar">${nama}</div>
        <div class="kegiatan-label">${kegiatan}</div>

        <div class="blockchain-status">
            <span>✔ Tersimpan di Blockchain · ${escapeHtml(certId)}</span>
        </div>

        <div class="detail-section">
            <h3>Data Mahasiswa</h3>
            <div class="detail-row">
                <span class="detail-label">NIM</span>
                <span class="detail-value">${nim}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Program Studi</span>
                <span class="detail-value">${prodi}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Angkatan</span>
                <span class="detail-value">${angkatan}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Tanggal Kegiatan</span>
                <span class="detail-value">${tanggal}</span>
            </div>
        </div>

        <div class="detail-section">
            <h3>Data Blockchain</h3>
            <div class="detail-row">
                <span class="detail-label">ID Sertifikat</span>
                <span class="detail-value">${escapeHtml(certId)}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Waktu Penerbitan</span>
                <span class="detail-value">${formatTimestamp(issuedAt)}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Network</span>
                <span class="detail-value">Ethereum Sepolia</span>
            </div>
        </div>

        <div class="hash-box">
            <div class="hash-label">Hash yang diverifikasi</div>
            <div class="hash-value">${escapeHtml(hashHex)}</div>
        </div>

    </div>`;
}

// ── MAIN ──
(async function main() {
    const params   = new URLSearchParams(window.location.search);
    const hashParam = params.get("hash");

    if (!hashParam) {
        renderError("Tidak ada hash sertifikat di URL. Scan QR Code dari sertifikat resmi.");
        return;
    }

    const hashHex = hashParam.startsWith("0x") ? hashParam : "0x" + hashParam;

    if (!/^0x[0-9a-fA-F]{64}$/.test(hashHex)) {
        renderError("Format hash tidak valid. Pastikan Anda scan QR dari sertifikat yang benar.");
        return;
    }

    // Ambil data mahasiswa dari URL jika ada (dikirim via QR)
    let qrData = null;
    try {
        const raw = params.get("data");
        if (raw) qrData = JSON.parse(decodeURIComponent(raw));
    } catch (_) {}

    try {
        const [isValid, issuedAt, certId] = await contract.verifyCertificate(hashHex);
        renderResult(isValid, issuedAt, certId, hashHex, qrData);
    } catch (err) {
        console.error(err);
        renderError("Gagal menghubungi blockchain. Pastikan koneksi internet aktif.\n\nDetail: " + err.message);
    }
})();
</script>

</body>
</html>
